# External Resources Configuration
# This file defines external resources that will be installed into target harnesses.
# Local Skills
# Skills from the local skills/ folder in this repo. No name or source required.
# Only skills listed here (and enabled) are symlinked to target harnesses.
local:
  enabled: true
  skills:
    - expert-in-swiss-laws
    #- github-ghec
    - lazyvim-expert
    - loop-orchestration-engineer
    - nixos-linux-specialist
    - packer-imaging-expert
    - spec-driven-initiation-engineer
    - terraform-platform-engineer

  # Each resource can have:
  #   - skills: list of skill folders to symlink (from skills/ subfolder or root SKILL.md)
  #   - agents: list of agent files to symlink (from agents/ subfolder)
  #   - plugins: list of plugins to install via harness commands (from plugins/ subfolder)
  #   - npx-package: GitHub owner/repo shorthand. Produces "npx skills add <package> <install-args>".
  #                   Example: npx-package: "shadcn/improve" -> npx skills add shadcn/improve -g
  #                   When set, the resource is NOT cloned or symlinked.
  #   - install-args: optional flags appended to the npx skills add command (e.g. "-g" for global)
  #   - npx-command: full custom command string for non-standard installs (e.g. CLI tools).
  #                   Takes priority over npx-package. Example: "npx @colbymchenry/codegraph install --yes"
  # If skills/agents/plugins is empty or missing:
  #   - For skills: link repo root if SKILL.md exists, or link all from skills/ subfolder
  #   - For agents: only link if explicitly listed
  #   - For plugins: report install commands (NOT symlinked)
resources:
  - name: anthropic-cybersecurity
    source: https://github.com/mukul975/Anthropic-Cybersecurity-Skills.git
    enabled: false
    npx-package: "mukul975/Anthropic-Cybersecurity-Skills"
    install-args: "-g"
    skills: []
    agents: []
  - name: drawio
    source: https://github.com/Agents365-ai/365-skills.git
    enabled: true
    npx-package: "Agents365-ai/365-skills"
    install-args: "-g"
    skills: []
    agents: []

  - name: improve
    source: https://github.com/shadcn/improve.git
    enabled: false
    npx-package: "shadcn/improve"
    install-args: "-g"
    skills: []
    agents: []

  - name: codeberg-skill
    source: https://codeberg.org/CypherpunkSamurai/codeberg-skill.git
    enabled: false
    npx-package: "CypherpunkSamurai/codeberg-skill"
    install-args: "-g"
    skills: []
    agents: []
  - name: agent-skills
    source: https://codeberg.org/ky64/agent-skills.git
    enabled: false
    npx-package: "ky64/agent-skills"
    install-args: "-g"
    skills: []
    agents: []
  - name: mattpocock-skills
    source: https://github.com/mattpocock/skills.git
    enabled: false
    npx-package: "mattpocock/skills"
    install-args: "-g"
    skills: []
    agents: []
  - name: superpowers
    source: https://github.com/obra/superpowers.git
    enabled: false
    npx-package: "obra/superpowers"
    install-args: "-g"
    skills: []
    agents: []

  - name: awesome-copilot
    source: https://codeberg.org/codebergmember123/awesome-copilot.git
    enabled: false
    npx-package: "codebergmember123/awesome-copilot"
    install-args: "-g"
    skills: []
    agents: []
  - name: codegraph
    source: https://github.com/colbymchenry/codegraph.git
    enabled: true
    npx-command: "npx @colbymchenry/codegraph install --yes --no-permissions"
    skills: []
    agents: []
  - name: agentic-awesome-skills
    source: https://github.com/sickn33/agentic-awesome-skills.git
    enabled: true
    npx-package: "sickn33/agentic-awesome-skills"
    install-args: "-g"
    skills: []
  - name: mukul975/Anthropic-Cybersecurity-Skills
    source: https://github.com/mukul975/Anthropic-Cybersecurity-Skills.git
    enabled: true
    npx-package: "mukul975/Anthropic-Cybersecurity-Skills"
    install-args: "-g"
  - name: graphify
    source: https://github.com/Graphify-Labs/graphify.git
    enabled: true
    npx-command: "pipx install graphifyy && graphify install --platform agents"
    skills: []
    agents: []
# Standalone Plugins
# Plugins are installed via harness-specific commands (never downloaded locally)
# Each plugin source can be one of:
#   - Git repository URL: github:user/repo, https://github.com/user/repo.git
#   - Local path: ./path/to/plugin, /absolute/path/to/plugin
#   - NPM package: @scope/plugin-name, plugin-name (supports semver ranges like name@^1.2)
#   - Marketplace plugin: plugin-name@marketplace-name (after marketplace is added)
plugins:
  - name: ponytail
    source: https://github.com/DietrichGebert/ponytail
    enabled: true

# External Resources Configuration
# This file defines external skills and plugins that will be installed into target harnesses.

# Skills
# Each skill is a directory with SKILL.md that gets symlinked to the target's skills/ folder
skills:
  - name: anthropic-cybersecurity
    source: https://codeberg.org/Bob-by/Anthropic-Cybersecurity-Skills.git
    enabled: false
    skills: []

  - name: drawio
    source: https://github.com/Agents365-ai/drawio-skill.git
    enabled: true
    skills:
      - drawio-skill

  - name: improve
    source: https://github.com/shadcn/improve.git
    enabled: true
    skills:
      - improve

  - name: security-skills
    source: https://github.com/Pixability/Security-Skills.git
    enabled: true
    skills: []

  - name: devsecops-skills
    source: https://github.com/OWASP/devsecops-skills.git
    enabled: true
    skills: []

  - name: codeberg-skill
    source: https://codeberg.org/CypherpunkSamurai/codeberg-skill.git
    enabled: true
    skills:
      - codeberg-skill

  - name: agent-skills
    source: https://codeberg.org/ky64/agent-skills.git
    enabled: true
    skills:
      - code-review
      - engineering
      - planning
      - security-research

  - name: awesome-copilot
    source: https://codeberg.org/codebergmember123/awesome-copilot.git
    enabled: true
    skills: []

# Plugins
# Plugins are installed via harness-specific commands (never downloaded locally)
# Each plugin source can be one of:
#   - Git repository URL: github:user/repo, https://github.com/user/repo.git
#   - Local path: ./path/to/plugin, /absolute/path/to/plugin
#   - NPM package: @scope/plugin-name, plugin-name (supports semver ranges like name@^1.2)
#   - Marketplace plugin: plugin-name@marketplace-name (after marketplace is added)
plugins:
  - name: ponytail
    source: https://github.com/DietrichGebert/ponytail
    enabled: true
